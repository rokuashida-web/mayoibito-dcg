<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>マヨイビト v0.2 ｜ Stage A 静的レイアウト</title>
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<!-- =====================================================================
     Stage A：静的レイアウト確認用の画面
     ---------------------------------------------------------------------
     ・ゲームのルール処理には、まだ一切つないでいません
     ・カードはすべて仮の枠（番号つき）です
     ・下の「調整パネル」で枚数や見え方を変えて確認できます
     ・座標は 1080×1920 の設計座標をそのまま使い、
       画面サイズに合わせて全体を等倍で縮小しています
     ===================================================================== -->

<div id="viewport">
  <div id="stage">

    <!-- ================= 盤面（斜め視点をかける層） ================= -->
    <div id="board-plane">

      <!-- --- コンベア風の追跡矢印（カードより後ろ・盤面背景より前：仕様書 21.2） --- -->
      <svg id="pursuit-arrows" viewBox="0 0 1080 1920" preserveAspectRatio="none"></svg>

      <!-- --- 相手の通常盤面：左＝相手の人間(5) / 右＝相手の怪異(6) --- -->
      <div class="zone zone--opp-normal-human" id="opp-normal-human" data-no="5"></div>
      <div class="zone zone--opp-normal-youkai" id="opp-normal-youkai" data-no="6"></div>

      <!-- --- 相手の追跡カード：左＝追跡されている人間(8) / 右＝追跡している怪異(9) --- -->
      <div class="zone zone--opp-track-human" id="opp-track-human" data-no="8"></div>
      <div class="zone zone--opp-track-youkai" id="opp-track-youkai" data-no="9"></div>

      <!-- --- 自分の追跡カード：左＝追跡している怪異(12) / 右＝追跡されている人間(13) --- -->
      <div class="zone zone--self-track-youkai" id="self-track-youkai" data-no="12"></div>
      <div class="zone zone--self-track-human" id="self-track-human" data-no="13"></div>

      <!-- --- 自分の通常盤面：左＝自分の怪異(16) / 右＝自分の人間(17) --- -->
      <div class="zone zone--self-normal-youkai" id="self-normal-youkai" data-no="16"></div>
      <div class="zone zone--self-normal-human" id="self-normal-human" data-no="17"></div>

    </div>

    <!-- ================= 相手側の固定UI（画面上端） ================= -->
    <div class="band band--top"></div>

    <!-- 1 相手の簡略手札（裏向きの重ね＋枚数） -->
    <div class="ui-box hand-mini hand-mini--opp" id="opp-hand-mini" data-no="1">
      <div class="hand-mini__stack"></div>
      <div class="hand-mini__count">0</div>
    </div>

    <!-- 2 相手のフィールドカード＋相手のロスト数 -->
    <div class="ui-box field-box field-box--opp" data-no="2">
      <div class="field-box__card"><span>フィールド</span></div>
      <div class="field-box__lost"><span class="field-box__label">ロスト</span><span class="field-box__value">2 / 4</span></div>
    </div>

    <!-- 3 相手のトラッシュ -->
    <div class="ui-box hexbtn hexbtn--opp-trash" id="btn-opp-trash" data-no="3"><span>トラッシュ 5</span></div>

    <!-- 4 相手の気力数 -->
    <div class="ui-box energy-box energy-box--opp" data-no="4">
      <span class="energy-box__label">気力</span><span class="energy-box__value">4</span>
    </div>

    <!-- 7 相手の山札（枚数は常時表示） -->
    <div class="ui-box deck-box deck-box--opp" data-no="7">
      <div class="deck-box__count">残り 27枚</div>
      <div class="deck-box__card"><span>山札</span></div>
    </div>

    <!-- ================= 自分側の固定UI（画面下端） ================= -->
    <div class="band band--bottom"></div>

    <!-- 10 設定（リタイアなど） -->
    <div class="ui-box roundbtn" id="btn-settings" data-no="10"><span>設定</span></div>

    <!-- 11 ログ（経過表示もこの先） -->
    <div class="ui-box hexbtn hexbtn--log" id="btn-log" data-no="11"><span>ログ</span></div>

    <!-- 14 メイン終了／対象確定 -->
    <div class="ui-box hexbtn hexbtn--main" id="btn-main" data-no="14"><span>ターン終了</span></div>

    <!-- 15 自分の山札（枚数は常時表示） -->
    <div class="ui-box deck-box deck-box--self" data-no="15">
      <div class="deck-box__count">残り 31枚</div>
      <div class="deck-box__card"><span>山札</span></div>
    </div>

    <!-- 18 自分の気力数 -->
    <div class="ui-box energy-box energy-box--self" data-no="18">
      <span class="energy-box__label">気力</span><span class="energy-box__value">6</span>
    </div>

    <!-- 19 自分のトラッシュ -->
    <div class="ui-box hexbtn hexbtn--self-trash" id="btn-self-trash" data-no="19"><span>トラッシュ 8</span></div>

    <!-- 20 自分のフィールドカード＋自分のロスト数 -->
    <div class="ui-box field-box field-box--self" data-no="20">
      <div class="field-box__card"><span>フィールド</span></div>
      <div class="field-box__lost"><span class="field-box__label">ロスト</span><span class="field-box__value">4 / 5</span></div>
    </div>

    <!-- 21 自分の簡略手札（タップで拡大手札へ） -->
    <div class="ui-box hand-mini hand-mini--self" id="self-hand-mini" data-no="21">
      <div class="hand-mini__stack"></div>
      <div class="hand-mini__count">0</div>
    </div>

    <!-- ================= 自分の拡大手札（扇状・最前面） ================= -->
    <div id="hand-fan" class="is-hidden"></div>

    <!-- 追跡選択中の仮矢印（カードより前に出す：仕様書 21.3） -->
    <svg id="drag-arrow" viewBox="0 0 1080 1920" preserveAspectRatio="none"></svg>

    <!-- ターン交代のときに画面を暗くする幕 -->
    <div id="dim-screen"></div>

    <!-- ログ・トラッシュ・設定で使い回す画面 -->
    <div id="sheet">
      <div class="sheet">
        <div class="sheet__title"></div>
        <div class="sheet__body"></div>
        <div class="sheet__buttons">
          <button type="button" class="dlg__btn dlg__btn--primary" id="sheet-close">閉じる</button>
        </div>
      </div>
    </div>

    <!-- ゲーム開始前の画面 -->
    <div id="start-screen">
      <div class="start__text">タップしてゲームを開始</div>
    </div>

    <!-- カードを選ぶ画面（効果でトラッシュや手札から選ぶとき） -->
    <div id="picker">
      <div class="pick">
        <div class="pick__title"></div>
        <div class="pick__message"></div>
        <div class="pick__grid"></div>
        <div class="pick__buttons"></div>
      </div>
    </div>

    <!-- 盤面のカードを選ぶときの案内 -->
    <div id="target-hint"></div>

    <!-- 案内・確認ダイアログ（マリガン、警告、対象選択などに使う） -->
    <div id="dialog">
      <div class="dlg">
        <div class="dlg__title"></div>
        <div class="dlg__message"></div>
        <div class="dlg__buttons"></div>
      </div>
    </div>

    <!-- 画面中央の大きな文字（「追跡」「襲撃」：仕様書 20・21.4） -->
    <div id="banner"><span></span></div>

    <!-- イベント用の一時的なドロップ先（仕様書 18.3。ドラッグ中だけ出る） -->
    <div id="event-drop" class="is-hidden"></div>

    <!-- 移動演出の層。手札より後ろを通るものと、手札の上を通るものの2枚 -->
    <div id="fly-layer"></div>
    <div id="fly-layer-top"></div>

    <!-- ドラッグ中のカードを乗せる層（最前面） -->
    <div id="drag-layer"></div>

    <!-- 短いお知らせ（ドロップ失敗の理由など） -->
    <div id="toast"></div>

    <!-- クイック詳細（画面左上・盤面を押し下げない重ね表示） -->
    <div id="quick-detail"></div>

    <!-- 拡大詳細（画面中央・背景操作を止める） -->
    <div id="zoom-detail"></div>

  </div>
</div>

<!-- 横向き警告 -->
<div id="orientation-warning">端末を縦向きにしてください</div>

<!-- =====================================================================
     調整パネル（Stage A 専用。本実装では削除します）
     ===================================================================== -->
<button id="panel-toggle" type="button">調整</button>
<div id="panel" class="is-closed">
  <div class="panel__title">Stage A 調整パネル<span class="panel__note">（確認用・本番では消します）</span></div>

  <div class="panel__group">
    <div class="panel__head">盤面の枚数</div>
    <label>自分の怪異 <input type="range" id="c-self-youkai" min="0" max="3" value="2"><span class="v">2</span></label>
    <label>自分の人間 <input type="range" id="c-self-human" min="0" max="3" value="2"><span class="v">2</span></label>
    <label>相手の怪異 <input type="range" id="c-opp-youkai" min="0" max="3" value="2"><span class="v">2</span></label>
    <label>相手の人間 <input type="range" id="c-opp-human" min="0" max="3" value="2"><span class="v">2</span></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">追跡</div>
    <label><input type="checkbox" id="t-self" checked> 自分の怪異 → 相手の人間</label>
    <label><input type="checkbox" id="t-opp" checked> 相手の怪異 → 自分の人間</label>
  </div>

  <div class="panel__group">
    <div class="panel__head">ゲーム進行（Stage H）</div>
    <label>シード <input type="text" id="seed-input" placeholder="空欄なら自動" style="width:150px"></label>
    <label><button type="button" id="btn-restart">はじめから</button></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">演出の確認</div>
    <label><button type="button" id="btn-attack-demo">襲撃の演出を試す</button></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">手札</div>
    <label>自分の枚数 <input type="range" id="c-hand" min="0" max="10" value="6"><span class="v">6</span></label>
    <label>相手の枚数 <input type="range" id="c-opp-hand" min="0" max="10" value="5"><span class="v">5</span></label>
    <label><input type="checkbox" id="hand-expanded"> 拡大表示にする</label>
    <label>選択中 <input type="range" id="hand-selected" min="-1" max="9" value="-1"><span class="v">なし</span></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">見え方（仮の値）</div>
    <label>遠近 perspective <input type="range" id="v-perspective" min="500" max="2400" step="50" value="850"><span class="v">850</span></label>
    <label>盤面の傾き <input type="range" id="v-tilt" min="0" max="12" step="0.5" value="7"><span class="v">7</span></label>
    <label>奥のカード縮小 <input type="range" id="v-far" min="70" max="100" value="90"><span class="v">0.90</span></label>
    <label>場の高さ <input type="range" id="v-shift" min="0" max="200" value="75"><span class="v">75</span></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">手札の扇（3つは独立して効きます）</div>
    <label>カード間隔 <input type="range" id="v-spacing" min="60" max="260" value="120"><span class="v">120</span></label>
    <label>弧の深さ <input type="range" id="v-arc" min="0" max="200" value="30"><span class="v">30</span></label>
    <label>端の傾き <input type="range" id="v-fan" min="0" max="45" value="20"><span class="v">20</span></label>
    <label>手札の高さ <input type="range" id="v-bottom" min="0" max="340" value="90"><span class="v">90</span></label>
    <label>選択時のせり出し <input type="range" id="v-fan-lift" min="0" max="140" value="35"><span class="v">35</span></label>
    <label>選択時の拡大 <input type="range" id="v-fan-scale" min="100" max="140" value="114"><span class="v">1.14</span></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">現在値の表示位置（カード画像に重ねる数値）</div>
    <label>大きさ <input type="range" id="v-ov-size" min="15" max="50" value="30"><span class="v">0.30</span></label>
    <label>左位置 <input type="range" id="v-ov-left" min="0" max="300" value="0"><span class="v">0.000</span></label>
    <label>すき間 <input type="range" id="v-ov-gap" min="0" max="40" value="0"><span class="v">0.00</span></label>
    <label>下位置 <input type="range" id="v-ov-bottom" min="0" max="300" value="0"><span class="v">0.000</span></label>
    <label>フィールド（自分） <input type="range" id="v-field-h" min="80" max="210" value="200"><span class="v">200</span></label>
    <label>フィールド（相手） <input type="range" id="v-field-h-opp" min="80" max="210" value="180"><span class="v">180</span></label>
  </div>

  <div class="panel__group">
    <div class="panel__head">表示</div>
    <label><input type="checkbox" id="show-numbers" checked> 番号を表示</label>
    <label><input type="checkbox" id="show-guides"> 領域の枠を表示</label>
  </div>
</div>

<script src="js/cards.js"></script>
<script src="js/decks.js"></script>
<script src="js/random.js"></script>
<script src="js/effects.js"></script>
<script src="js/game.js"></script>
<script src="js/card-images.js"></script>
<script src="js/preview.js"></script>
</body>
</html>
